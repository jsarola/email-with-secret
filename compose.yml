services:

  # ── Mail catcher ─────────────────────────────────────────────────────────────
  maildev:
    image: maildev/maildev:latest
    container_name: maildev
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "1080:1080"   # Web UI → http://localhost:1080

  # ── OneTimeSecret backend (Redis) ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ots-redis
    restart: unless-stopped

  # ── OneTimeSecret app ────────────────────────────────────────────────────────
  onetimesecret:
    image: onetimesecret/onetimesecret:latest
    container_name: onetimesecret
    restart: unless-stopped
    depends_on:
      - redis
    ports:
      - "3000:3000"   # Web UI + API → http://localhost:3000
    environment:
      SECRET: "changeme_generate_with_openssl_rand_hex_32"
      REDIS_URL: redis://redis:6379/0
      HOST: localhost:3000
      SSL: "false"
      AUTH_REQUIRED: "false"
